<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>MEGA GYM Workout App</title>
<style>
:root{--gold:#d4af37;--gold2:#f2d56b;--panel:#171717;--muted:#aaa}
*{box-sizing:border-box}
body{margin:0;background:#050505;color:#fff;font-family:Arial,sans-serif}
button,a{font:inherit}.app{max-width:780px;margin:auto;min-height:100vh;background:linear-gradient(#080808,#111)}
.screen{display:none;min-height:100vh;padding:18px 16px 46px}.screen.active{display:block}
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end;padding:28px 20px;background:radial-gradient(circle at top,#353535,#080808 58%,#000)}
.logo{color:var(--gold2);font-weight:900;letter-spacing:2px;font-size:14px}
h1{font-size:44px;line-height:.95;margin:12px 0}h2{font-size:29px}h3{margin:0 0 8px}
.muted{color:var(--muted);line-height:1.5}
.topbar{display:flex;gap:12px;align-items:center;position:sticky;top:0;background:linear-gradient(#080808 75%,transparent);padding:10px 0 16px;z-index:10}
.back{width:43px;height:43px;border-radius:50%;border:1px solid #444;background:#1b1b1b;color:#fff}
.btn{border:0;border-radius:14px;padding:14px;font-weight:900;cursor:pointer;text-align:center;text-decoration:none}
.primary{background:var(--gold);color:#111}.dark{background:#292929;color:#fff;border:1px solid #444}
.card,.equipment-card{background:var(--panel);border:1px solid #303030;border-radius:20px;overflow:hidden;margin-bottom:14px}
.card-body,.eq-body{padding:17px}
.program-img,.machine-img{width:100%;height:210px;object-fit:cover;display:block}
.placeholder{height:210px;background:linear-gradient(135deg,#292929,#151515);display:grid;place-items:center;text-align:center;color:#777;font-weight:800;padding:15px}
.badge{display:inline-block;background:rgba(212,175,55,.14);border:1px solid rgba(212,175,55,.35);color:var(--gold2);padding:7px 10px;border-radius:999px;font-size:12px;font-weight:900;margin-bottom:9px}
.info{background:#1e1e1e;border-left:3px solid var(--gold);padding:12px;border-radius:10px;margin:9px 0}
.choice{width:100%;text-align:left;background:linear-gradient(135deg,#202020,#111);color:#fff;border:1px solid #333;border-radius:17px;padding:17px;margin-bottom:10px}
.choice b{display:block;color:var(--gold2);margin-bottom:6px}.exercise-name{font-size:18px;font-weight:900}
.params{display:grid;grid-template-columns:1fr 1fr;gap:8px}.param{background:#202020;border-radius:12px;padding:11px}.param span{display:block;font-size:11px;color:#aaa}.param strong{color:var(--gold2)}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:50;align-items:center;justify-content:center;padding:16px}.modal.show{display:flex}
.modal-box{width:100%;max-width:720px;max-height:92vh;overflow:auto;background:#151515;border:1px solid #333;border-radius:20px;padding:16px}
.close{float:right;width:40px;height:40px;border-radius:50%;border:0;background:#303030;color:#fff;font-size:20px}
.full-image{width:100%;max-height:75vh;object-fit:contain;background:#0a0a0a;border-radius:14px}
.video-frame{width:100%;aspect-ratio:16/9;border:0;border-radius:14px;background:#000}
.notice{background:#292313;border:1px solid #615326;color:#ead98e;padding:13px;border-radius:12px}
@media(max-width:480px){.actions{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
<section id="home" class="screen active"></section>
<section id="programs" class="screen"></section>
<section id="programDetail" class="screen"></section>
<section id="days" class="screen"></section>
<section id="muscles" class="screen"></section>
<section id="exercise" class="screen"></section>
</div>
<div id="modal" class="modal"><div class="modal-box"><button class="close" onclick="closeModal()">×</button><div id="modalBody"></div></div></div>

let state={programCode:null,day:null,exerciseCode:null};
const $=id=>document.getElementById(id);
function show(id){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));$(id).classList.add('active');window.scrollTo(0,0)}
function back(id){return `<button class="back" onclick="show('${id}')">←</button>`}
function imageOrPlaceholder(url,label,cls=''){return url?`<img class="${cls}" src="${url}" alt="${label}">`:`<div class="placeholder">${label}<br><small>Συμπλήρωσε URL στο Excel</small></div>`}
function youtubeEmbed(url){
 if(!url)return '';
 let id='';
 try{
  if(url.includes('youtu.be/'))id=url.split('youtu.be/')[1].split(/[?&]/)[0];
  else if(url.includes('youtube.com/watch'))id=new URL(url).searchParams.get('v')||'';
  else if(url.includes('youtube.com/embed/'))id=url.split('/embed/')[1].split(/[?&]/)[0];
 }catch(e){}
 return id?`https://www.youtube.com/embed/${id}`:'';
}
function renderHome(){
 $('home').innerHTML=`<div class="hero"><div class="logo">MEGA GYM</div><h1>YOUR TRAINING PLAN</h1>
 <p class="muted">Πρόγραμμα → Ημέρα → Μυϊκή ομάδα → Άσκηση → Προτεινόμενος εξοπλισμός.</p>
 <button class="btn primary" onclick="renderPrograms()">ΠΡΟΓΡΑΜΜΑΤΑ ΑΝΔΡΩΝ</button></div>`;
}
function renderPrograms(){
 $('programs').innerHTML=`<div class="topbar">${back('home')}<div class="logo">MEGA GYM</div></div><h2>ΠΡΟΓΡΑΜΜΑΤΑ</h2>
 ${DB.programs.filter(p=>p.active==='ΝΑΙ').sort((a,b)=>a.order-b.order).map(p=>`<article class="card">
 ${imageOrPlaceholder(p.image,'ΦΩΤΟΓΡΑΦΙΑ ΠΡΟΓΡΑΜΜΑΤΟΣ','program-img')}
 <div class="card-body"><span class="badge">${p.total_days} ΗΜΕΡΕΣ</span><h3>${p.name}</h3><p class="muted">${p.description}</p>
 <button class="btn primary" style="width:100%" onclick="openProgramDetail('${p.code}')">ΠΛΗΡΟΦΟΡΙΕΣ</button></div></article>`).join('')}`;
 show('programs');
}
function openProgramDetail(code){
 state.programCode=code;const p=DB.programs.find(x=>x.code===code);
 $('programDetail').innerHTML=`<div class="topbar">${back('programs')}<div class="logo">MEGA GYM</div></div><h2>${p.name}</h2>
 <div class="card"><div class="card-body">
 <div class="info"><b>ΠΕΡΙΓΡΑΦΗ</b><div class="muted">${p.description}</div></div>
 <div class="info"><b>ΑΠΟΤΕΛΕΣΜΑΤΑ</b><div class="muted">${p.results}</div></div>
 <div class="info"><b>ΔΙΑΤΡΟΦΗ</b><div class="muted">${p.nutrition}</div></div>
 <div class="info"><b>ΠΑΡΑΤΗΡΗΣΕΙΣ</b><div class="muted">${p.observations}</div></div>
 <button class="btn primary" style="width:100%" onclick="openProgram('${code}')">ΕΝΑΡΞΗ ΠΡΟΓΡΑΜΜΑΤΟΣ</button></div></div>`;
 show('programDetail');
}
function openProgram(code){
 state.programCode=code;const p=DB.programs.find(x=>x.code===code);
 const days=[...new Set(DB.builder.filter(x=>x.programCode===code&&x.active==='ΝΑΙ').map(x=>x.day))];
 $('days').innerHTML=`<div class="topbar">${back('programDetail')}<div class="logo">MEGA GYM</div></div><h2>${p.name}</h2>
 ${days.map(day=>{const r=DB.builder.find(x=>x.programCode===code&&x.day===day);
 return `<button class="choice" onclick="openDay(${day})"><b>${r.dayButton}</b>${r.dayTitle}</button>`}).join('')}`;
 show('days');
}
function openDay(day){
 state.day=day;
 const rows=DB.builder.filter(x=>x.programCode===state.programCode&&x.day===day&&x.active==='ΝΑΙ').sort((a,b)=>a.muscleOrder-b.muscleOrder);
 $('muscles').innerHTML=`<div class="topbar">${back('days')}<div class="logo">MEGA GYM</div></div>
 <div class="logo">${rows[0].dayButton}</div><h2>${rows[0].dayTitle}</h2>
 ${rows.map(r=>`<button class="choice" onclick="openExercise('${r.exerciseCode}')"><b>${r.muscleTitle}</b><div class="exercise-name">${r.exerciseName}</div></button>`).join('')}`;
 show('muscles');
}
function openExercise(code){
 state.exerciseCode=code;const e=DB.exercises[code];
 const items=(DB.recommended[code]||[]).filter(x=>x.active==='ΝΑΙ');
 $('exercise').innerHTML=`<div class="topbar">${back('muscles')}<div class="logo">MEGA GYM</div></div><div class="logo">${e.muscle}</div><h2>${e.name}</h2>
 <div class="card"><div class="card-body">
 <div class="info"><b>ΠΕΡΙΓΡΑΦΗ</b><div class="muted">${e.description}</div></div>
 <div class="params"><div class="param"><span>SETS</span><strong>${e.sets}</strong></div><div class="param"><span>REPS</span><strong>${e.reps}</strong></div><div class="param"><span>TEMPO</span><strong>${e.tempo}</strong></div><div class="param"><span>ΔΙΑΛΕΙΜΜΑ</span><strong>${e.rest} sec</strong></div></div>
 <div class="info"><b>ΤΕΧΝΙΚΗ</b><div class="muted">${e.technique}</div></div>
 <div class="info"><b>ΑΝΑΠΝΟΗ</b><div class="muted">${e.breathing}</div></div>
 <div class="info"><b>WARM UP</b><div class="muted">${e.warmup}</div></div>
 <div class="info"><b>ΣΥΧΝΑ ΛΑΘΗ</b><div class="muted">${e.mistakes}</div></div>
 <div class="info"><b>ΣΚΟΠΟΣ</b><div class="muted">${e.purpose}</div></div></div></div>
 <h2>ΠΡΟΤΕΙΝΟΜΕΝΟΣ ΕΞΟΠΛΙΣΜΟΣ</h2>
 ${items.map(item=>`<article class="equipment-card">
 ${imageOrPlaceholder(item.machinePhoto,'ΦΩΤΟΓΡΑΦΙΑ ΠΡΟΤΕΙΝΟΜΕΝΟΥ ΜΗΧΑΝΗΜΑΤΟΣ','machine-img')}
 <div class="eq-body"><span class="badge">${item.priority}η ΠΡΟΤΕΡΑΙΟΤΗΤΑ</span><h3>${item.equipmentName}</h3>
 ${item.note?`<p class="muted">${item.note}</p>`:''}
 <div class="actions">
 <button class="btn primary" onclick="openExerciseImage(${item.priority})">ΑΣΚΗΣΗ</button>
 <button class="btn dark" onclick="openExerciseVideo(${item.priority})">VIDEO</button>
 </div></div></article>`).join('')}`;
 show('exercise');
}
function currentItem(priority){
 return (DB.recommended[state.exerciseCode]||[]).find(x=>x.priority===priority);
}
function openExerciseImage(priority){
 const item=currentItem(priority);const e=DB.exercises[state.exerciseCode];
 $('modalBody').innerHTML=item&&item.exercisePhoto
 ? `<div class="logo">ΑΣΚΗΣΗ ΜΕ ΤΟ ΣΥΓΚΕΚΡΙΜΕΝΟ ΜΗΧΑΝΗΜΑ</div><h2>${e.name} — ${item.equipmentName}</h2><img class="full-image" src="${item.exercisePhoto}" alt="${e.name}">`
 : `<div class="logo">ΑΣΚΗΣΗ</div><h2>${e.name}</h2><div class="notice">Δεν έχει συμπληρωθεί η «Φωτογραφία Άσκησης με Αυτό το Μηχάνημα URL» στη συγκεκριμένη γραμμή του Excel.</div>`;
 $('modal').classList.add('show');
}
function openExerciseVideo(priority){
 const item=currentItem(priority);const e=DB.exercises[state.exerciseCode];
 if(!item||!item.exerciseVideo){
  $('modalBody').innerHTML=`<div class="logo">VIDEO</div><h2>${e.name}</h2><div class="notice">Δεν έχει συμπληρωθεί το «Video Άσκησης με Αυτό το Μηχάνημα URL» στη συγκεκριμένη γραμμή του Excel.</div>`;
  $('modal').classList.add('show');return;
 }
 const embed=youtubeEmbed(item.exerciseVideo);
 $('modalBody').innerHTML=`<div class="logo">VIDEO ΜΕ ΤΟ ΣΥΓΚΕΚΡΙΜΕΝΟ ΜΗΧΑΝΗΜΑ</div><h2>${e.name} — ${item.equipmentName}</h2>
 ${embed?`<iframe class="video-frame" src="${embed}" allowfullscreen></iframe>`:
 `<video controls playsinline class="video-frame"><source src="${item.exerciseVideo}"></video>
 <a href="${item.exerciseVideo}" target="_blank" class="btn primary" style="display:block;margin-top:12px">ΑΝΟΙΓΜΑ VIDEO</a>`}`;
 $('modal').classList.add('show');
}
function closeModal(){$('modal').classList.remove('show')}
renderHome();
</script>
